name: Release

# Build the Windows + Linux installers and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Pre-create the release as a DRAFT so electron-builder's concurrent artifact
      # uploads don't race to create it (that race throws 422 "tag_name
      # already_exists" and fails the publish). Crucially, a draft is NOT exposed
      # by GitHub as the "latest" release, so users checking for updates during
      # the build don't see a published-but-empty release and 404 on latest.yml.
      # The final `publish` job flips it to published once all assets are up.
      - name: Ensure the GitHub draft release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "$TAG" --notes "Build in progress…" || true
          fi

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Set release notes from CHANGELOG
        shell: bash
        # Purely cosmetic. This must NEVER fail (a non-zero exit fails release-win
        # and skips release-linux via `needs:`). Always exits 0.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          printf '%s' "$NOTES" > release-notes.md
          # Find the release (including a draft electron-builder may still be
          # finalising) via the list endpoint, then PATCH only its body.
          RID=""
          for i in 1 2 3 4 5 6 7 8; do
            RID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${TAG}\") | .id" 2>/dev/null | head -n1)
            [ -n "$RID" ] && break
            sleep 8
          done
          if [ -z "$RID" ]; then
            echo "::warning::Release for ${TAG} not found; skipping notes."
            exit 0
          fi
          # Send the body from a file to avoid any shell/flag quoting issues.
          if gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RID}" \
              -F "body=@release-notes.md" 1>/dev/null 2>api-err.txt; then
            echo "Release notes set for ${TAG} (release ${RID})."
          else
            echo "::warning::Could not set notes (non-fatal). API said:"
            cat api-err.txt || true
          fi
          exit 0

  release-linux:
    runs-on: ubuntu-latest
    needs: release-win # run after Windows so the release already exists (no race)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The draft release already exists (created by release-win), but guard anyway
      # so Linux's concurrent uploads never race to create it either.
      - name: Ensure the GitHub draft release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "$TAG" --notes "Build in progress…" || true
          fi

      - name: Build & publish Linux packages (AppImage + deb)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:linux

  # Flip the draft to a published release only after BOTH installers are uploaded,
  # so it becomes "latest" (and visible to auto-update) only when latest.yml and
  # the installers are actually present. Runs as long as Windows succeeded, so a
  # flaky Linux build never blocks the Windows update from shipping.
  publish:
    runs-on: ubuntu-latest
    needs: [release-win, release-linux]
    if: always() && needs.release-win.result == 'success'
    steps:
      - name: Publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release edit "$TAG" --draft=false --latest
