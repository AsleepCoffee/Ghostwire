name: Release

# Build the Windows + Linux installers and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # gh owns a single release; electron-builder only builds (--publish never)
      # and assets are uploaded explicitly. It's created as a prerelease so it's
      # resolvable by tag on every runner yet stays out of "latest" and hidden
      # from auto-update until the publish job promotes it.
      - name: Create the prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --prerelease --title "$TAG" --notes "Build in progress…"
          fi

      - name: Build Windows installer (no publish)
        run: npm run build:win

      - name: Upload Windows installer + update manifest to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          V="${TAG#v}"
          gh release upload "$TAG" \
            "dist/GhostWire-Setup-${V}.exe" \
            "dist/GhostWire-Setup-${V}.exe.blockmap" \
            "dist/latest.yml" --clobber

      - name: Set release notes from CHANGELOG
        shell: bash
        # Purely cosmetic. This must NEVER fail (a non-zero exit fails release-win
        # and skips release-linux via `needs:`). Always exits 0.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          V="${TAG#v}"
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          # Append the standard verify + build-from-source footer.
          {
            printf '%s\n\n' "$NOTES"
            sed -e "s|__TAG__|${TAG}|g" -e "s|__V__|${V}|g" -e "s|__REPO__|${GITHUB_REPOSITORY}|g" \
              .github/RELEASE_FOOTER.md
          } > release-notes.md
          # Resolve the release id, then set its body.
          RID=""
          for i in 1 2 3 4 5 6 7 8; do
            RID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${TAG}\") | .id" 2>/dev/null | head -n1)
            [ -n "$RID" ] && break
            sleep 8
          done
          if [ -z "$RID" ]; then
            echo "::warning::Release for ${TAG} not found; skipping notes."
            exit 0
          fi
          # Send the body from a file to avoid any shell/flag quoting issues.
          if gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RID}" \
              -F "body=@release-notes.md" 1>/dev/null 2>api-err.txt; then
            echo "Release notes set for ${TAG} (release ${RID})."
          else
            echo "::warning::Could not set notes (non-fatal). API said:"
            cat api-err.txt || true
          fi
          exit 0

  release-linux:
    runs-on: ubuntu-latest
    needs: release-win # run after Windows so the release already exists (no race)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build only, then upload into the release that release-win created.
      - name: Build Linux packages (no publish)
        run: npm run build:linux

      - name: Upload Linux packages into the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/*.AppImage dist/*.deb dist/latest-linux.yml --clobber

  # Promote the prerelease to "latest" only after both installers are uploaded,
  # so auto-update never sees a half-built release. Runs if Windows succeeded, so
  # a flaky Linux build doesn't block the Windows update.
  publish:
    runs-on: ubuntu-latest
    needs: [release-win, release-linux]
    if: always() && needs.release-win.result == 'success'
    steps:
      - name: Publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Prerelease assets for $TAG:"; echo "$ASSETS"
          # Safety net: never expose a release as "latest" without the Windows
          # auto-update manifest, or every Windows client 404s on latest.yml.
          if ! echo "$ASSETS" | grep -qx 'latest.yml'; then
            echo "::error::latest.yml is missing from the $TAG release — refusing to publish."
            exit 1
          fi
          # Publish SHA-256 checksums of every asset so users can verify their
          # download (or a self-compiled build) against this release. Compute to a
          # temp file OUTSIDE the download dir so the sums file can't hash itself.
          work="$(mktemp -d)"
          sums="$(mktemp)"
          gh release download "$TAG" --dir "$work" || true
          ( cd "$work" && sha256sum * ) 2>/dev/null | grep -v ' SHA256SUMS.txt$' > "$sums" || true
          if [ -s "$sums" ]; then
            cp "$sums" "$work/SHA256SUMS.txt"
            gh release upload "$TAG" "$work/SHA256SUMS.txt" --clobber
          fi
          # Flip prerelease -> full release and mark it latest.
          gh release edit "$TAG" --prerelease=false --latest
