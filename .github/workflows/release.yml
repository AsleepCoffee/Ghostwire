name: Release

# Build the Windows installer and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Set release notes from CHANGELOG
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this tag (## v0.1.6 ... up to the next ## heading).
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          printf '%s\n' "$NOTES" > release-notes.md
          gh release edit "$TAG" --notes-file release-notes.md
