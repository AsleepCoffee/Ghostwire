name: Release

# Build the Windows + Linux installers and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # electron-builder is the SOLE owner of the release: with releaseType=draft
      # it creates ONE draft for this version and uploads the Windows installer +
      # latest.yml into it. (We must NOT pre-create the release with `gh` — that
      # made a second draft for the same tag, and the publish job could un-draft
      # the wrong one, shipping a release with no latest.yml. v0.1.88/89 hit that.)
      # A draft isn't exposed as "latest", so update checks during the build keep
      # seeing the previous good release instead of 404-ing on a half-built one.
      - name: Build & publish Windows installer (into a draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Set release notes from CHANGELOG
        shell: bash
        # Purely cosmetic. This must NEVER fail (a non-zero exit fails release-win
        # and skips release-linux via `needs:`). Always exits 0.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          printf '%s' "$NOTES" > release-notes.md
          # Find the release (including a draft electron-builder may still be
          # finalising) via the list endpoint, then PATCH only its body.
          RID=""
          for i in 1 2 3 4 5 6 7 8; do
            RID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${TAG}\") | .id" 2>/dev/null | head -n1)
            [ -n "$RID" ] && break
            sleep 8
          done
          if [ -z "$RID" ]; then
            echo "::warning::Release for ${TAG} not found; skipping notes."
            exit 0
          fi
          # Send the body from a file to avoid any shell/flag quoting issues.
          if gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RID}" \
              -F "body=@release-notes.md" 1>/dev/null 2>api-err.txt; then
            echo "Release notes set for ${TAG} (release ${RID})."
          else
            echo "::warning::Could not set notes (non-fatal). API said:"
            cat api-err.txt || true
          fi
          exit 0

  release-linux:
    runs-on: ubuntu-latest
    needs: release-win # run after Windows so the release already exists (no race)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builder finds the existing draft created by release-win (same
      # version tag) and appends the Linux packages to it — no second release.
      - name: Build & publish Linux packages into the same draft (AppImage + deb)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:linux

  # Flip the draft to a published release only after BOTH installers are uploaded,
  # so it becomes "latest" (and visible to auto-update) only when latest.yml and
  # the installers are actually present. Runs as long as Windows succeeded, so a
  # flaky Linux build never blocks the Windows update from shipping.
  publish:
    runs-on: ubuntu-latest
    needs: [release-win, release-linux]
    if: always() && needs.release-win.result == 'success'
    steps:
      - name: Publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Draft assets for $TAG:"; echo "$ASSETS"
          # Safety net: never expose a release as "latest" without the Windows
          # auto-update manifest, or every Windows client 404s on latest.yml.
          if ! echo "$ASSETS" | grep -qx 'latest.yml'; then
            echo "::error::latest.yml is missing from the $TAG draft — refusing to publish."
            exit 1
          fi
          gh release edit "$TAG" --draft=false --latest
