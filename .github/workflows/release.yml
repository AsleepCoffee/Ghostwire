name: Release

# Build the Windows + Linux installers and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Set release notes from CHANGELOG
        shell: bash
        # Cosmetic — never let a notes hiccup fail the job (which would skip the
        # Linux build via `needs: release-win`).
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          # Patch ONLY the body of the release electron-builder already published
          # for this tag (gh release edit can 422 on tag_name; gh api PATCH by id
          # avoids that). Retry briefly for API eventual-consistency.
          RID=""
          for i in 1 2 3 4 5 6; do
            RID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .id 2>/dev/null || true)
            [ -n "$RID" ] && break
            sleep 5
          done
          if [ -n "$RID" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RID}" -f body="$NOTES" >/dev/null
            echo "Updated release notes for ${TAG} (release ${RID})."
          else
            echo "No published release found for ${TAG}; leaving notes as-is."
          fi

  release-linux:
    runs-on: ubuntu-latest
    needs: release-win # run after Windows so the release already exists (no race)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Linux packages (AppImage + deb)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:linux
