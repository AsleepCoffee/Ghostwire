name: Release

# Build the Windows + Linux installers and publish a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # We do NOT let electron-builder publish — across the two OS jobs it kept
      # creating duplicate releases for the tag and splitting assets (v0.1.88-93).
      # Instead gh owns ONE release, electron-builder only BUILDS (--publish never),
      # and assets are uploaded explicitly with `gh release upload`.
      #
      # The release is created as a PRERELEASE, not a draft. A draft can't be
      # resolved by `gh release upload/view <tag>` on the ubuntu runners (GitHub's
      # /releases/tags/{tag} endpoint 404s on drafts — that broke v0.1.94's Linux
      # + publish jobs). A prerelease IS published so it's found by tag on every
      # runner, yet it's excluded from /releases/latest and ignored by
      # electron-updater (allowPrerelease=false), so it stays invisible to
      # auto-update until the publish job flips it to a full latest release.
      - name: Create the prerelease (gh owns it)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --prerelease --title "$TAG" --notes "Build in progress…"
          fi

      - name: Build Windows installer (no publish)
        run: npm run build:win

      - name: Upload Windows installer + update manifest to the draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          V="${TAG#v}"
          gh release upload "$TAG" \
            "dist/GhostWire-Setup-${V}.exe" \
            "dist/GhostWire-Setup-${V}.exe.blockmap" \
            "dist/latest.yml" --clobber

      - name: Set release notes from CHANGELOG
        shell: bash
        # Purely cosmetic. This must NEVER fail (a non-zero exit fails release-win
        # and skips release-linux via `needs:`). Always exits 0.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(awk -v tag="## ${TAG}" '
            $0 == tag {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See the commit history for changes in ${TAG}."; fi
          printf '%s' "$NOTES" > release-notes.md
          # Find the release (including a draft electron-builder may still be
          # finalising) via the list endpoint, then PATCH only its body.
          RID=""
          for i in 1 2 3 4 5 6 7 8; do
            RID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name==\"${TAG}\") | .id" 2>/dev/null | head -n1)
            [ -n "$RID" ] && break
            sleep 8
          done
          if [ -z "$RID" ]; then
            echo "::warning::Release for ${TAG} not found; skipping notes."
            exit 0
          fi
          # Send the body from a file to avoid any shell/flag quoting issues.
          if gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RID}" \
              -F "body=@release-notes.md" 1>/dev/null 2>api-err.txt; then
            echo "Release notes set for ${TAG} (release ${RID})."
          else
            echo "::warning::Could not set notes (non-fatal). API said:"
            cat api-err.txt || true
          fi
          exit 0

  release-linux:
    runs-on: ubuntu-latest
    needs: release-win # run after Windows so the release already exists (no race)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build only (no publish), then upload into the single gh-owned draft that
      # release-win created. Same pattern as Windows — gh is the only thing that
      # touches the release, so assets can't be split across rival drafts.
      - name: Build Linux packages (no publish)
        run: npm run build:linux

      - name: Upload Linux packages into the draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/*.AppImage dist/*.deb dist/latest-linux.yml --clobber

  # Flip the draft to a published release only after BOTH installers are uploaded,
  # so it becomes "latest" (and visible to auto-update) only when latest.yml and
  # the installers are actually present. Runs as long as Windows succeeded, so a
  # flaky Linux build never blocks the Windows update from shipping.
  publish:
    runs-on: ubuntu-latest
    needs: [release-win, release-linux]
    if: always() && needs.release-win.result == 'success'
    steps:
      - name: Publish the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Prerelease assets for $TAG:"; echo "$ASSETS"
          # Safety net: never expose a release as "latest" without the Windows
          # auto-update manifest, or every Windows client 404s on latest.yml.
          if ! echo "$ASSETS" | grep -qx 'latest.yml'; then
            echo "::error::latest.yml is missing from the $TAG release — refusing to publish."
            exit 1
          fi
          # Flip prerelease -> full release and mark it latest.
          gh release edit "$TAG" --prerelease=false --latest
